<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Linearicons — SVG Gallery</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    /* ─── Tokens ─── */
    :root {
      --color-bg:           #FFFFFF;
      --color-bg-secondary: #FAFAFA;
      --color-bg-tertiary:  #F2F2F2;
      --color-text:         #111111;
      --color-text-muted:   #666666;
      --color-text-subtle:  #999999;
      --color-border:       #EAEAEA;
      --color-border-strong:#000000;
      --color-border-focus: #000000;
      --color-accent:       #000000;
      --color-accent-text:  #FFFFFF;
      --color-success:      #16A34A;
      --color-error:        #EE0000;
      --color-warning:      #F5A623;

      --font-sans: 'Geist', system-ui, -apple-system, sans-serif;
      --font-mono: 'Geist Mono', Menlo, monospace;

      --text-h1-size: 42px; --text-h1-weight: 700; --text-h1-lh: 1.1; --text-h1-ls: -0.04em;
      --text-h2-size: 28px; --text-h2-weight: 600; --text-h2-lh: 1.2; --text-h2-ls: -0.03em;
      --text-h3-size: 20px; --text-h3-weight: 600; --text-h3-lh: 1.3; --text-h3-ls: -0.02em;
      --text-body-size: 16px; --text-body-weight: 400; --text-body-lh: 1.5;
      --text-small-size: 14px; --text-small-weight: 400; --text-small-lh: 1.5;
      --text-label-size: 12px; --text-label-weight: 500; --text-label-lh: 1; --text-label-ls: 0.05em;
      --text-code-size: 13px; --text-code-weight: 400; --text-code-lh: 1.6;

      --space-1:  4px;
      --space-2:  8px;
      --space-3:  12px;
      --space-4:  16px;
      --space-6:  24px;
      --space-8:  32px;
      --space-12: 48px;
      --space-16: 64px;

      --radius-sm:   6px;
      --radius-md:   8px;
      --radius-lg:  12px;
      --radius-full: 9999px;

      --elevation-0: none;
      --elevation-1: 0 4px 12px rgba(0,0,0,0.05);
      --elevation-2: 0 8px 32px rgba(0,0,0,0.08);

      --backdrop:    blur(12px);
      --backdrop-bg: rgba(255,255,255,0.85);

      --duration-fast: 150ms;
      --duration-base: 200ms;
      --duration-slow: 300ms;
      --ease-out:    cubic-bezier(0.16, 1, 0.3, 1);
      --ease-in-out: cubic-bezier(0.4, 0, 0.2, 1);

      --z-dropdown: 100;
      --z-modal:    200;
      --z-toast:    300;
      --z-tooltip:  400;
    }

    @media (prefers-color-scheme: dark) { :root:not([data-theme="light"]) {
      --color-accent:       #EDEDED;
      --color-accent-text:  #000000;
      --color-bg:           #000000;
      --color-bg-secondary: #0A0A0A;
      --color-bg-tertiary:  #111111;
      --color-text:         #EDEDED;
      --color-text-muted:   #888888;
      --color-text-subtle:  #555555;
      --color-border:       #333333;
      --color-border-strong:#FFFFFF;
      --color-border-focus: #FFFFFF;
      --backdrop-bg: rgba(0,0,0,0.85);
      --elevation-1: 0 4px 12px rgba(0,0,0,0.3);
      --elevation-2: 0 8px 32px rgba(0,0,0,0.5);
    }}

    :root[data-theme="dark"] {
      --color-accent:       #EDEDED;
      --color-accent-text:  #000000;
      --color-bg:           #000000;
      --color-bg-secondary: #0A0A0A;
      --color-bg-tertiary:  #111111;
      --color-text:         #EDEDED;
      --color-text-muted:   #888888;
      --color-text-subtle:  #555555;
      --color-border:       #333333;
      --color-border-strong:#FFFFFF;
      --color-border-focus: #FFFFFF;
      --backdrop-bg: rgba(0,0,0,0.85);
      --elevation-1: 0 4px 12px rgba(0,0,0,0.3);
      --elevation-2: 0 8px 32px rgba(0,0,0,0.5);
    }

    /* ─── Reset ─── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    *:focus { outline: none; }
    *:focus-visible {
      outline: 2px solid var(--color-border-focus);
      outline-offset: 2px;
      border-radius: var(--radius-sm);
    }

    body {
      font-family: var(--font-sans);
      font-size: var(--text-body-size);
      font-weight: var(--text-body-weight);
      line-height: var(--text-body-lh);
      color: var(--color-text);
      background: var(--color-bg);
      min-height: 100vh;
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { transition-duration: 0.01ms !important; animation-duration: 0.01ms !important; }
    }

    /* ─── Navigation ─── */
    .nav {
      position: sticky;
      top: 0;
      z-index: var(--z-dropdown);
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 var(--space-16);
      background: var(--backdrop-bg);
      backdrop-filter: var(--backdrop);
      -webkit-backdrop-filter: var(--backdrop);
      border-bottom: 1px solid var(--color-border);
      gap: var(--space-6);
    }

    .nav__brand {
      display: flex;
      align-items: center;
      gap: var(--space-3);
      flex-shrink: 0;
    }

    .nav__title {
      font-size: var(--text-h3-size);
      font-weight: var(--text-h3-weight);
      letter-spacing: var(--text-h3-ls);
      color: var(--color-text);
      line-height: 1;
    }

    .nav__badge {
      display: inline-flex;
      align-items: center;
      padding: 2px var(--space-2);
      background: var(--color-bg-tertiary);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-sm);
      font-size: var(--text-label-size);
      font-weight: var(--text-label-weight);
      letter-spacing: var(--text-label-ls);
      text-transform: uppercase;
      color: var(--color-text-muted);
      font-variant-numeric: tabular-nums;
    }

    .nav__actions {
      display: flex;
      align-items: center;
      gap: var(--space-3);
    }

    /* ─── Search Field ─── */
    .search-field { position: relative; display: flex; align-items: center; }

    .search-field svg {
      position: absolute;
      left: 10px;
      width: 16px;
      height: 16px;
      color: var(--color-text-subtle);
      pointer-events: none;
      stroke: currentColor;
      fill: none;
      stroke-width: 1.5;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .search-field__input {
      height: 36px;
      padding: 0 var(--space-3) 0 34px;
      background: var(--color-bg-secondary);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-full);
      font-size: var(--text-small-size);
      font-family: var(--font-sans);
      color: var(--color-text);
      width: 240px;
      transition:
        border-color var(--duration-fast) var(--ease-out),
        box-shadow   var(--duration-fast) var(--ease-out),
        width        var(--duration-base) var(--ease-out);
    }

    .search-field__input::placeholder { color: var(--color-text-subtle); }

    .search-field__input:focus {
      outline: none;
      border-color: var(--color-border-focus);
      box-shadow: 0 0 0 3px rgba(0,0,0,0.08);
      width: 300px;
    }

    :root[data-theme="dark"] .search-field__input:focus {
      box-shadow: 0 0 0 3px rgba(255,255,255,0.1);
    }

    @media (prefers-color-scheme: dark) { :root:not([data-theme="light"]) .search-field__input:focus {
      box-shadow: 0 0 0 3px rgba(255,255,255,0.1);
    }}

    /* ─── Dark mode toggle ─── */
    .btn-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 36px;
      height: 36px;
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
      background: transparent;
      color: var(--color-text-muted);
      cursor: pointer;
      transition:
        color       var(--duration-fast) var(--ease-out),
        background  var(--duration-fast) var(--ease-out),
        border-color var(--duration-fast) var(--ease-out);
      flex-shrink: 0;
    }

    .btn-icon:hover {
      color: var(--color-text);
      background: var(--color-bg-tertiary);
      border-color: var(--color-border-strong);
    }

    .btn-icon:active { transform: scale(0.95); }

    .btn-icon svg {
      width: 16px;
      height: 16px;
      stroke: currentColor;
      fill: none;
      stroke-width: 1.5;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    /* ─── Main layout ─── */
    .main {
      max-width: 1200px;
      margin: 0 auto;
      padding: var(--space-8) var(--space-16);
    }

    .main__header {
      display: flex;
      align-items: baseline;
      gap: var(--space-3);
      margin-bottom: var(--space-6);
    }

    .main__count {
      font-size: var(--text-label-size);
      font-weight: var(--text-label-weight);
      letter-spacing: var(--text-label-ls);
      text-transform: uppercase;
      color: var(--color-text-subtle);
      font-variant-numeric: tabular-nums;
    }

    /* ─── Empty state ─── */
    .empty-state {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: var(--space-16) var(--space-8);
      color: var(--color-text-subtle);
      gap: var(--space-3);
    }

    .empty-state svg {
      width: 32px;
      height: 32px;
      stroke: currentColor;
      fill: none;
      stroke-width: 1.5;
      stroke-linecap: round;
      stroke-linejoin: round;
      opacity: 0.4;
    }

    .empty-state p {
      font-size: var(--text-small-size);
    }

    .empty-state.is-visible { display: flex; }

    /* ─── Icons grid ─── */
    .icons-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
      gap: var(--space-3);
    }

    /* ─── Icon card ─── */
    .icon-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--space-2);
      padding: var(--space-4) var(--space-3) var(--space-3);
      background: var(--color-bg-secondary);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-lg);
      text-decoration: none;
      color: inherit;
      cursor: pointer;
      transition:
        box-shadow   var(--duration-base) var(--ease-out),
        border-color var(--duration-base) var(--ease-out);
      position: relative;
      overflow: hidden;
    }

    .icon-card:hover {
      box-shadow: var(--elevation-1);
      border-color: var(--color-border-strong);
    }

    .icon-card:hover .icon-card__download { opacity: 1; transform: translateY(0); }
    .icon-card:hover .icon-card__name { opacity: 0.6; }

    .icon-card__preview {
      width: 48px;
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .icon-card__preview img {
      width: 40px;
      height: 40px;
      object-fit: contain;
    }

    /* Dark mode: invert SVGs (they are black on white) */
    :root[data-theme="dark"] .icon-card__preview img {
      filter: invert(1);
    }

    @media (prefers-color-scheme: dark) { :root:not([data-theme="light"]) .icon-card__preview img {
      filter: invert(1);
    }}

    .icon-card__name {
      font-size: var(--text-label-size);
      font-weight: var(--text-label-weight);
      letter-spacing: var(--text-label-ls);
      text-transform: uppercase;
      color: var(--color-text-muted);
      text-align: center;
      line-height: var(--text-label-lh);
      width: 100%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      transition: opacity var(--duration-fast) var(--ease-out);
    }

    .icon-card__download {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: var(--space-1);
      height: 28px;
      padding: 0 var(--space-3);
      background: var(--color-accent);
      color: var(--color-accent-text);
      border: none;
      border-radius: var(--radius-full);
      font-size: 12px;
      font-weight: 500;
      font-family: var(--font-sans);
      text-decoration: none;
      cursor: pointer;
      opacity: 0;
      transform: translateY(4px);
      transition:
        opacity   var(--duration-fast) var(--ease-out),
        transform var(--duration-fast) var(--ease-out);
    }

    .icon-card__download svg {
      width: 12px;
      height: 12px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
      flex-shrink: 0;
    }

    /* Touch devices: always show download */
    @media (hover: none) {
      .icon-card__download { opacity: 1; transform: translateY(0); }
      .icon-card__name { opacity: 0.6; }
    }

    /* ─── Responsive ─── */
    @media (max-width: 1024px) {
      .nav { padding: 0 var(--space-8); }
      .main { padding: var(--space-8); }
    }

    @media (max-width: 768px) {
      .nav {
        height: 56px;
        padding: 0 var(--space-4);
        gap: var(--space-2);
      }
      .main { padding: var(--space-6) var(--space-4); }
      .search-field__input { width: 160px; }
      .search-field__input:focus { width: 200px; }
      .icons-grid { grid-template-columns: repeat(auto-fill, minmax(96px, 1fr)); gap: var(--space-2); }
    }

    @media (max-width: 480px) {
      .nav__title { font-size: var(--text-small-size); font-weight: 600; }
      .icons-grid { grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); }
    }
  </style>
</head>

      { file: '0088-cloud-gear.svg',       name: 'cloud gear' },
      { file: '0089-cloud-alert.svg',      name: 'cloud alert' },
      { file: '0090-cloud-check.svg',      name: 'cloud check' },
      { file: '0091-cloud-cross.svg',      name: 'cloud cross' },
      { file: '0092-cloud-crossed.svg',    name: 'cloud crossed' },
      { file: '0093-cloud-database.svg',   name: 'cloud database' },
      { file: '0094-database.svg',         name: 'database' },
      { file: '0095-database-add.svg',     name: 'database add' },
      { file: '0096-database-remove.svg',  name: 'database remove' },
      { file: '0097-database-lock.svg',    name: 'database lock' },
      { file: '0098-database-refresh.svg', name: 'database refresh' },
      { file: '0099-database-check.svg',   name: 'database check' },
      { file: '0100-database-history.svg', name: 'database history' },
    ];

    const DOWNLOAD_SVG = `<svg aria-hidden="true" viewBox="0 0 24 24"><polyline points="8 17 12 21 16 17"/><line x1="12" y1="12" x2="12" y2="21"/><path d="M20.88 18.09A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.29"/></svg>`;

    const grid = document.getElementById('icons-grid');
    const searchInput = document.getElementById('search-input');
    const resultCount = document.getElementById('result-count');
    const countBadge = document.getElementById('count-badge');
    const emptyState = document.getElementById('empty-state');

    function buildCard(icon) {
      const card = document.createElement('div');
      card.className = 'icon-card';
      card.setAttribute('role', 'listitem');
      card.dataset.name = icon.name;

      const preview = document.createElement('div');
      preview.className = 'icon-card__preview';
      const img = document.createElement('img');
      img.src = `SVG/${icon.file}`;
      img.alt = icon.name;
      img.width = 40;
      img.height = 40;
      img.loading = 'lazy';
      preview.appendChild(img);

      const name = document.createElement('span');
      name.className = 'icon-card__name';
      name.textContent = icon.name;
      name.title = icon.name;

      const dl = document.createElement('a');
      dl.className = 'icon-card__download';
      dl.href = `SVG/${icon.file}`;
      dl.download = icon.file;
      dl.setAttribute('aria-label', `Télécharger ${icon.name}`);
      dl.innerHTML = DOWNLOAD_SVG + 'SVG';

      card.appendChild(preview);
      card.appendChild(name);
      card.appendChild(dl);
      return card;
    }

    // Initial render
    ICONS.forEach(icon => grid.appendChild(buildCard(icon)));

    // Search filter
    searchInput.addEventListener('input', () => {
      const q = searchInput.value.trim().toLowerCase();
      let visible = 0;
      grid.querySelectorAll('.icon-card').forEach((card, i) => {
        const match = !q || ICONS[i].name.includes(q) || ICONS[i].file.includes(q);
        card.style.display = match ? '' : 'none';
        if (match) visible++;
      });
      const label = visible === 1 ? '1 icône' : `${visible} icônes`;
      resultCount.textContent = q ? label : `${ICONS.length} icônes`;
      countBadge.textContent = visible;
      emptyState.classList.toggle('is-visible', visible === 0);
    });

    // Dark mode toggle
    const root = document.documentElement;
    const iconSun = document.getElementById('icon-sun');
    const iconMoon = document.getElementById('icon-moon');

    function isDark() {
      return root.getAttribute('data-theme') === 'dark' ||
        (!root.getAttribute('data-theme') && window.matchMedia('(prefers-color-scheme: dark)').matches);
    }

    function updateToggleIcon() {
      const dark = isDark();
      iconSun.style.display  = dark ? 'none' : '';
      iconMoon.style.display = dark ? '' : 'none';
    }

    updateToggleIcon();

    document.getElementById('theme-toggle').addEventListener('click', () => {
      root.setAttribute('data-theme', isDark() ? 'light' : 'dark');
      updateToggleIcon();
    });
  </script>
</body>
</html>
